# Spring相关配置
spring:
  application:
    name: hmdp
  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: jdbc:mysql://127.0.0.1:3306/hmdp01?useSSL=false&serverTimezone=UTC
    username: root
    password: Nczxldr!
  data:
    redis:
      host: localhost
      port: 6379
      password: Nczxldr!
      lettuce:
        pool:
          max-active: 10
          max-idle: 10
          min-idle: 1
          time-between-eviction-runs: 10s
  rabbitmq:
    host: localhost
    port: 5672
    username: guest
    password: guest
    listener:
      simple:
        acknowledge-mode: auto
        prefetch: 10
  jackson:
    default-property-inclusion: non_null # JSON处理时忽略空字段
  web:
    resources:
      static-locations: classpath:/static/

